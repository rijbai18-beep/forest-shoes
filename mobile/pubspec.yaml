name: forest_shoes
description: Forest Shoes - Premium Footwear E-Commerce App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.2
  firebase_messaging: ^15.0.4
  firebase_analytics: ^11.2.1

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  lottie: ^3.1.0
  flutter_rating_bar: ^4.0.1
  flutter_svg: ^2.0.10
  smooth_page_indicator: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  animated_bottom_navigation_bar: ^1.3.3

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  overlay_support: ^2.1.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.2.0

  # PDF & Printing
  pdf: ^3.11.1
  printing: ^5.13.1

  # Storage & Networking
  shared_preferences: ^2.3.1
  connectivity_plus: ^6.0.5
  dio: ^5.6.0

  # Utilities
  intl: ^0.20.0
  uuid: ^4.5.0
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  open_filex: ^4.4.0

  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: ForestShoes
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
