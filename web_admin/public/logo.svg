<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" fill="none">
  <!-- Full horizontal logo: icon mark + wordmark -->

  <!-- ── Icon Mark (200×200) ──────────────────────────────────── -->
  <g>
    <!-- Background rounded square -->
    <rect width="200" height="200" rx="44" fill="#1B5E20"/>

    <!-- ── Shoe upper (main body) ──────────────────────────────── -->
    <!-- Right-facing sneaker; upper is the large curved body -->
    <path d="
      M 46 122
      C 44 110 44 96 50 84
      C 56 72 68 66 80 66
      C 88 66 96 70 100 77
      L 106 88
      C 118 84 132 81 148 80
      C 164 79 178 81 190 88
      C 196 91 198 98 196 104
      L 194 114
      C 192 120 186 124 180 124
      L 54 124
      C 50 124 47 123 46 122
      Z
    " fill="white"/>

    <!-- ── Sole ─────────────────────────────────────────────────── -->
    <path d="
      M 46 124
      L 180 124
      C 186 124 192 128 193 134
      L 194 140
      C 194 146 188 150 182 150
      L 50 150
      C 44 150 38 146 38 140
      L 38 132
      C 38 127 42 124 46 124
      Z
    " fill="#E8F5E9"/>

    <!-- ── Heel counter (back bump) ───────────────────────────────── -->
    <path d="
      M 50 90
      C 47 82 44 72 46 63
      C 48 54 55 49 63 50
      C 71 51 75 58 74 67
      L 72 84
      C 65 85 57 88 50 90
      Z
    " fill="white"/>

    <!-- ── Forest stripe (leaf-shaped swoosh on upper) ────────────── -->
    <path d="
      M 108 88
      C 130 82 158 82 178 92
      C 182 94 182 100 178 102
      C 158 108 130 108 108 114
      C 104 115 100 112 100 108
      C 100 104 104 90 108 88
      Z
    " fill="#4CAF50" opacity="0.90"/>

    <!-- ── Heel leaf sprout ───────────────────────────────────────── -->
    <!-- Leaf blade -->
    <path d="
      M 59 62
      C 50 52 44 40 52 30
      C 60 20 72 26 72 40
      C 72 50 67 58 59 62
      Z
    " fill="#81C784"/>
    <!-- Leaf stem / midrib -->
    <line x1="59" y1="62" x2="63" y2="33" stroke="#4CAF50" stroke-width="1.8" stroke-linecap="round"/>

    <!-- ── Lace dots ──────────────────────────────────────────────── -->
    <circle cx="116" cy="100" r="3.5" fill="#1B5E20" opacity="0.4"/>
    <circle cx="130" cy="97"  r="3.5" fill="#1B5E20" opacity="0.4"/>
    <circle cx="144" cy="95"  r="3.5" fill="#1B5E20" opacity="0.4"/>
    <circle cx="158" cy="94"  r="3.5" fill="#1B5E20" opacity="0.4"/>
  </g>

  <!-- ── Wordmark ────────────────────────────────────────────────── -->
  <g font-family="'Poppins', 'Inter', system-ui, sans-serif">
    <!-- FOREST -->
    <text
      x="224" y="108"
      font-size="62"
      font-weight="800"
      letter-spacing="-1"
      fill="#1B5E20"
    >FOREST</text>
    <!-- SHOES -->
    <text
      x="227" y="156"
      font-size="38"
      font-weight="400"
      letter-spacing="10"
      fill="#2E7D32"
    >SHOES</text>
    <!-- Leaf accent between lines -->
    <path d="M 224 120 L 600 120" stroke="#E8E0CC" stroke-width="1"/>
  </g>
</svg>
