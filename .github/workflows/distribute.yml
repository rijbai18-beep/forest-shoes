name: Build & Distribute Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-distribute:
    name: Build APK & Upload to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK (R8 + Dart obfuscation)
        working-directory: mobile
        run: |
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-symbols

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:645366167801:android:a4079823d275b2f3f5ca28
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          releaseNotes: |
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            ${{ github.event.head_commit.message }}
